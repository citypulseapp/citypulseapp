<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityPulse - Greece, NY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>CityPulse</h1>
                <p class="subtitle">Greece, NY</p>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-fire"></i>
                    <span>Trending</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Map</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Stats</span>
                </a>
            </nav>

            <div class="sidebar-stats">
                <div class="stat-item">
                    <span class="stat-number">65</span>
                    <span class="stat-label">Changes</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">4</span>
                    <span class="stat-label">Sources</span>
                </div>
            </div>
        </aside>

        <!-- Main Feed -->
        <main class="main-content">
            <div class="feed-header">
                <h2>Home</h2>
                <div class="feed-filters">
                    <button class="filter-btn active">All</button>
                    <button class="filter-btn">Permits</button>
                    <button class="filter-btn">Infrastructure</button>
                    <button class="filter-btn">Commercial</button>
                </div>
            </div>

            <div class="activity-feed" id="activity-feed">
                <div class="loading">Loading...</div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="right-sidebar">
            <div class="stats-card">
                <h3>This Week</h3>
                <div class="stat-grid">
                    <div class="stat-box">
                        <span class="stat-icon">🏗️</span>
                        <span class="stat-count">60</span>
                        <span class="stat-label">Development</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-icon">🚧</span>
                        <span class="stat-count">1</span>
                        <span class="stat-label">Infrastructure</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-icon">🏢</span>
                        <span class="stat-count">3</span>
                        <span class="stat-label">Commercial</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-icon">📊</span>
                        <span class="stat-count">1</span>
                        <span class="stat-label">Census</span>
                    </div>
                </div>
            </div>

            <div class="map-card">
                <h3>📍 Map View</h3>
                <div id="map"></div>
            </div>

            <div class="neighborhood-card">
                <h3>🏘️ Neighborhoods</h3>
                <div class="neighborhood-list" id="neighborhood-list">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
